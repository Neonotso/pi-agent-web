<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Piano Key Frequencies — Hz</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
  background: #0a0a14;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 24px 16px 40px;
  color: #e0e0e0;
}
h1 {
  font-size: 1.6em; margin-bottom: 2px;
  background: linear-gradient(90deg, #9b59ff, #00e070);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  font-weight: 800;
}
.subtitle { font-size: 0.8em; color: #666; margin-bottom: 4px; }
.extra-note { font-size: 0.75em; color: #888; font-style: italic; margin-bottom: 12px; }
.scrollbox {
  width: 100%; overflow-x: auto; overflow-y: visible;
  border-radius: 12px; padding: 10px 0 20px;
  scrollbar-width: thin; scrollbar-color: #444 transparent;
}
.scrollbox::-webkit-scrollbar { height: 8px; }
.scrollbox::-webkit-scrollbar-track { background: transparent; }
.scrollbox::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
svg text { user-select: none; }
.legend {
  display: flex; gap: 20px; margin-top: 12px;
  font-size: 0.75em; color: #888; flex-wrap: wrap; justify-content: center;
}
.legend-item { display: flex; align-items: center; gap: 5px; }
.legend-swatch { width: 16px; height: 12px; border-radius: 2px; border: 1px solid #555; }
.swatch-a4 { background: #fff9c4; border-color: #f9a825; }
.swatch-c4 { background: #b2ebf2; border-color: #00838f; }
.swatch-extra { background: #4a148c; border-color: #7b1fa2; }
.btn {
  padding: 6px 14px; border: 1px solid #444; border-radius: 6px;
  background: #1a1a2e; color: #aaa; font-size: 0.8em;
  cursor: pointer; font-family: inherit; transition: all 0.15s; margin: 14px 10px 0;
}
.btn:hover { background: #222; color: #ddd; }
.btn.active { background: #7b1fa2; border-color: #9c27b0; color: #fff; }
</style>
</head>
<body>
<h1>Piano Key Frequencies</h1>
<div class="subtitle">Standard 88-key piano · A4 = 440 Hz · Equal temperament</div>
<div class="extra-note">Purple keys are imaginary notes below/above the real piano (A0 to C8)</div>
<div class="scrollbox" id="scrollbox"><svg id="piano" xmlns="http://www.w3.org/2000/svg"></svg></div>
<div class="legend">
  <div class="legend-item"><div class="legend-swatch swatch-c4"></div> Middle C (C4)</div>
  <div class="legend-item"><div class="legend-swatch swatch-a4"></div> A440 (A4)</div>
  <div class="legend-item"><div class="legend-swatch swatch-extra"></div> Imaginary key</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#222;border-color:#555"></div> Black key</div>
</div>
<div><button class="btn active" onclick="zoom('full', this)">All keys</button>
<button class="btn" onclick="zoom('center', this)">Center (C3–E5)</button>
<button class="btn" onclick="zoom('tight', this)">Tight (C4–C6)</button></div>

<script>
const NS = 'http://www.w3.org/2000/svg';
const svg = document.getElementById('piano');
const WW = 40, WH = 220, BW = 24, BH = 138;

// Web Audio: click to play sine wave
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let activeOsc = null;
let activeGain = null;

function playNote(freq) {
  if (activeOsc) { stopNote(); }
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(0, audioCtx.currentTime);
  gain.gain.linearRampToValueAtTime(0.15, audioCtx.currentTime + 0.007);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  activeOsc = osc;
  activeGain = gain;
}

function stopNote() {
  if (activeOsc) {
    activeGain.gain.cancelScheduledValues(audioCtx.currentTime);
    activeGain.gain.setValueAtTime(activeGain.gain.value, audioCtx.currentTime);
    activeGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.08);
    activeOsc.stop(audioCtx.currentTime + 0.09);
    activeOsc = null;
    activeGain = null;
  }
}

// Standard chromatic scale: C, C#, D, D#, E, F, F#, G, G#, A, A#, B
const NOTES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const WHITE_NOTES = ['C','D','E','F','G','A','B'];

// Build all keys from MIDI 8 (G#-1) to ~20kHz (MIDI 135 = B9)
// Standard piano: MIDI 21 (A0) to MIDI 108 (C8)
const MIDI_START = 8;
const MIDI_END = 135; // B9, ~20000 Hz

const keys = [];
for (let midi = MIDI_START; midi <= MIDI_END; midi++) {
  const noteInOctave = midi % 12;
  const noteBase = NOTES[noteInOctave];
  const isBlack = noteBase.includes('#');
  const sharp = isBlack ? '♯' : '';
  
  // Standard piano octave formula
  const octave = Math.floor(midi / 12) - 1;
  
  const name = noteBase.replace('#', '') + sharp + octave;
  
  // Piano key number: standard piano starts at A0 (MIDI 21) = key 1
  const keyNum = midi - 21 + 1;
  const isStandard = keyNum >= 1 && keyNum <= 88;
  
  keys.push({ midi, keyNum, name, note: noteBase, isBlack, octave, freq: 440 * Math.pow(2, (midi - 69) / 12), isStandard });
}

const whiteKeys = keys.filter(k => !k.isBlack);
const totalW = whiteKeys.length * WW;
const svgH = WH + 50;

svg.setAttribute('width', totalW);
svg.setAttribute('height', svgH);
svg.setAttribute('viewBox', `0 0 ${totalW} ${svgH}`);

// Defs
const defs = document.createElementNS(NS, 'defs');

const wg = document.createElementNS(NS, 'linearGradient');
wg.id = 'wg'; wg.setAttribute('x1', '0'); wg.setAttribute('y1', '0');
wg.setAttribute('x2', '0'); wg.setAttribute('y2', '1');
wg.innerHTML = '<stop offset="0%" stop-color="#e0e0e0"/><stop offset="10%" stop-color="#f5f5f5"/><stop offset="90%" stop-color="#fff"/><stop offset="100%" stop-color="#d0d0d0"/>';
defs.appendChild(wg);

const wgExtra = document.createElementNS(NS, 'linearGradient');
wgExtra.id = 'wgExtra'; wgExtra.setAttribute('x1', '0'); wgExtra.setAttribute('y1', '0');
wgExtra.setAttribute('x2', '0'); wgExtra.setAttribute('y2', '1');
wgExtra.innerHTML = '<stop offset="0%" stop-color="#4a148c"/><stop offset="10%" stop-color="#6a1b9a"/><stop offset="90%" stop-color="#7b1fa2"/><stop offset="100%" stop-color="#4a148c"/>';
defs.appendChild(wgExtra);

const wshadow = document.createElementNS(NS, 'filter');
wshadow.id = 'wshadow';
wshadow.innerHTML = '<feDropShadow dx="0" dy="2" stdDeviation="1.5" flood-color="#000" flood-opacity="0.12"/>';
defs.appendChild(wshadow);

const extraShadow = document.createElementNS(NS, 'filter');
extraShadow.id = 'extraShadow';
extraShadow.innerHTML = '<feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#4a148c" flood-opacity="0.3"/>';
defs.appendChild(extraShadow);

const bg = document.createElementNS(NS, 'linearGradient');
bg.id = 'bg'; bg.setAttribute('x1', '0'); bg.setAttribute('y1', '0');
bg.setAttribute('x2', '0'); bg.setAttribute('y2', '1');
bg.innerHTML = '<stop offset="0%" stop-color="#505050"/><stop offset="30%" stop-color="#333"/><stop offset="100%" stop-color="#111"/>';
defs.appendChild(bg);

const bgExtra = document.createElementNS(NS, 'linearGradient');
bgExtra.id = 'bgExtra'; bgExtra.setAttribute('x1', '0'); bgExtra.setAttribute('y1', '0');
bgExtra.setAttribute('x2', '0'); bgExtra.setAttribute('y2', '1');
bgExtra.innerHTML = '<stop offset="0%" stop-color="#7b1fa2"/><stop offset="30%" stop-color="#4a148c"/><stop offset="100%" stop-color="#311b92"/>';
defs.appendChild(bgExtra);

const bsshadow = document.createElementNS(NS, 'filter');
bsshadow.id = 'bsshadow';
bsshadow.setAttribute('x', '-10%'); bsshadow.setAttribute('y', '-10%');
bsshadow.setAttribute('width', '120%'); bsshadow.setAttribute('height', '130%');
bsshadow.innerHTML = '<feDropShadow dx="0" dy="3" stdDeviation="2.5" flood-color="#000" flood-opacity="0.4"/>';
defs.appendChild(bsshadow);

svg.appendChild(defs);

// Hz formatting: just the number for display, full with units in tooltip
function formatFreq(freq) {
  return freq >= 1000 ? (freq / 1000).toFixed(1) : Math.round(freq);
}
function formatFreqFull(freq) {
  return freq.toFixed(1) + ' Hz';
}

// Draw white keys
for (let wi = 0; wi < whiteKeys.length; wi++) {
  const wk = whiteKeys[wi];
  const x = wi * WW;
  const grad = wk.isStandard ? 'url(#wg)' : 'url(#wgExtra)';
  const filter = wk.isStandard ? 'url(#wshadow)' : 'url(#extraShadow)';
  const stroke = wk.isStandard ? '#b0b0b0' : '#9c27b0';
  const strokeW = wk.isStandard ? 0.5 : 1.5;
  const textColor = wk.isStandard ? '#222' : '#e1bee7';
  const freqColor = wk.isStandard ? '#666' : '#ce93d8';
  
  const r = document.createElementNS(NS, 'rect');
  r.setAttribute('x', x); r.setAttribute('y', 0);
  r.setAttribute('width', WW - 1); r.setAttribute('height', WH);
  r.setAttribute('rx', 3); r.setAttribute('ry', 3);
  r.setAttribute('fill', grad);
  r.setAttribute('stroke', stroke); r.setAttribute('stroke-width', strokeW);
  r.setAttribute('filter', filter);
  r.setAttribute('data-midi', wk.midi);
  r.style.cursor = 'pointer';
  svg.appendChild(r);
  
  // Tooltip (must be child of rect for tooltip to work per-key)
  const title = document.createElementNS(NS, 'title');
  title.textContent = wk.name + ' — ' + formatFreqFull(wk.freq);
  r.appendChild(title);
  
  // Click to play
  r.addEventListener('mousedown', () => playNote(wk.freq));
  r.addEventListener('mouseup', stopNote);
  r.addEventListener('mouseleave', stopNote);
  
  const txt = document.createElementNS(NS, 'text');
  txt.setAttribute('x', x + WW / 2); txt.setAttribute('y', WH - 28);
  txt.setAttribute('text-anchor', 'middle'); txt.setAttribute('font-size', '12');
  txt.setAttribute('font-weight', '700'); txt.setAttribute('fill', textColor);
  txt.setAttribute('font-family', '-apple-system, Helvetica Neue, Arial, sans-serif');
  txt.textContent = wk.name;
  svg.appendChild(txt);
  
  const ftxt = document.createElementNS(NS, 'text');
  ftxt.setAttribute('x', x + WW / 2); ftxt.setAttribute('y', WH - 10);
  ftxt.setAttribute('text-anchor', 'middle'); ftxt.setAttribute('font-size', '11');
  ftxt.setAttribute('font-weight', '500'); ftxt.setAttribute('fill', freqColor);
  ftxt.setAttribute('font-family', '-apple-system, Helvetica Neue, Arial, sans-serif');
  ftxt.textContent = formatFreq(wk.freq);
  svg.appendChild(ftxt);
}

// Draw black keys
for (const bk of keys) {
  if (!bk.isBlack) continue;
  // Position black key centered between adjacent white keys
  const whiteCount = whiteKeys.filter(w => w.midi < bk.midi).length;
  const x = whiteCount * WW - BW / 2;
  
  const r = document.createElementNS(NS, 'rect');
  r.setAttribute('x', x); r.setAttribute('y', 0);
  r.setAttribute('width', BW); r.setAttribute('height', BH);
  r.setAttribute('rx', 2); r.setAttribute('ry', 2);
  r.setAttribute('fill', bk.isStandard ? 'url(#bg)' : 'url(#bgExtra)');
  r.setAttribute('stroke', bk.isStandard ? '#222' : '#9c27b0');
  r.setAttribute('stroke-width', bk.isStandard ? 0.5 : 1.5);
  r.setAttribute('filter', 'url(#bsshadow)');
  r.setAttribute('data-midi', bk.midi);
  r.style.cursor = 'pointer';
  svg.appendChild(r);
  
  // Tooltip
  const title = document.createElementNS(NS, 'title');
  title.textContent = bk.name + ' — ' + formatFreqFull(bk.freq);
  r.appendChild(title);
  
  // Click to play
  r.addEventListener('mousedown', () => playNote(bk.freq));
  r.addEventListener('mouseup', stopNote);
  r.addEventListener('mouseleave', stopNote);
  
  const hl = document.createElementNS(NS, 'rect');
  hl.setAttribute('x', x + 2); hl.setAttribute('y', 3);
  hl.setAttribute('width', BW - 4); hl.setAttribute('height', 2.5);
  hl.setAttribute('rx', 1); hl.setAttribute('fill', '#555'); hl.setAttribute('opacity', '0.5');
  svg.appendChild(hl);
  
  const txt = document.createElementNS(NS, 'text');
  txt.setAttribute('x', x + BW / 2); txt.setAttribute('y', BH - 14);
  txt.setAttribute('text-anchor', 'middle'); txt.setAttribute('font-size', '9');
  txt.setAttribute('font-weight', '600');
  txt.setAttribute('fill', bk.isStandard ? '#ccc' : '#e1bee7');
  txt.setAttribute('font-family', '-apple-system, Helvetica Neue, Arial, sans-serif');
  txt.textContent = bk.name;
  svg.appendChild(txt);
  
  // Hz value on black keys
  const ftxt = document.createElementNS(NS, 'text');
  ftxt.setAttribute('x', x + BW / 2); ftxt.setAttribute('y', BH - 2);
  ftxt.setAttribute('text-anchor', 'middle'); ftxt.setAttribute('font-size', '9');
  ftxt.setAttribute('fill', bk.isStandard ? '#999' : '#b39ddb');
  ftxt.setAttribute('font-family', '-apple-system, Helvetica Neue, Arial, sans-serif');
  ftxt.textContent = formatFreq(bk.freq);
  svg.appendChild(ftxt);
}

// Standard range marker lines
const a0Key = keys.find(k => k.midi === 21);
const c8Key = keys.find(k => k.midi === 108);

if (a0Key) {
  const a0wi = whiteKeys.indexOf(whiteKeys.find(w => w.midi === 21));
  if (a0wi >= 0) {
    const x = a0wi * WW;
    const line = document.createElementNS(NS, 'line');
    line.setAttribute('x1', x); line.setAttribute('y1', -12);
    line.setAttribute('x2', x); line.setAttribute('y2', WH);
    line.setAttribute('stroke', '#9c27b0'); line.setAttribute('stroke-width', '2');
    line.setAttribute('stroke-dasharray', '4,4');
    svg.appendChild(line);
    
    const lbl = document.createElementNS(NS, 'text');
    lbl.setAttribute('x', x + 3); lbl.setAttribute('y', -16);
    lbl.setAttribute('text-anchor', 'start'); lbl.setAttribute('font-size', '9');
    lbl.setAttribute('font-weight', '700'); lbl.setAttribute('fill', '#9c27b0');
    lbl.setAttribute('font-family', '-apple-system, Helvetica Neue, Arial, sans-serif');
    lbl.textContent = 'A0 (27.5 Hz)';
    svg.appendChild(lbl);
  }
}

if (c8Key) {
  const c8wi = whiteKeys.indexOf(whiteKeys.find(w => w.midi === 108));
  if (c8wi >= 0) {
    const x = (c8wi + 1) * WW;
    const line = document.createElementNS(NS, 'line');
    line.setAttribute('x1', x); line.setAttribute('y1', -12);
    line.setAttribute('x2', x); line.setAttribute('y2', WH);
    line.setAttribute('stroke', '#9c27b0'); line.setAttribute('stroke-width', '2');
    line.setAttribute('stroke-dasharray', '4,4');
    svg.appendChild(line);
    
    const lbl = document.createElementNS(NS, 'text');
    lbl.setAttribute('x', x + 3); lbl.setAttribute('y', -16);
    lbl.setAttribute('text-anchor', 'start'); lbl.setAttribute('font-size', '9');
    lbl.setAttribute('font-weight', '700'); lbl.setAttribute('fill', '#9c27b0');
    lbl.setAttribute('font-family', '-apple-system, Helvetica Neue, Arial, sans-serif');
    lbl.textContent = 'C8 (4186 Hz)';
    svg.appendChild(lbl);
  }
}

// Octave labels (only for standard keys)
for (const wk of whiteKeys) {
  if (wk.note === 'C' && wk.isStandard) {
    const wi = whiteKeys.indexOf(wk);
    const label = document.createElementNS(NS, 'text');
    label.setAttribute('x', wi * WW);
    label.setAttribute('y', WH + 18);
    label.setAttribute('text-anchor', 'middle');
    label.setAttribute('font-size', '10');
    label.setAttribute('font-weight', '700');
    label.setAttribute('fill', '#555');
    label.setAttribute('font-family', '-apple-system, Helvetica Neue, Arial, sans-serif');
    label.textContent = 'Oct ' + wk.octave;
    svg.appendChild(label);
  }
}

// Octave divider lines
for (const wk of whiteKeys) {
  if (wk.note === 'C' && wk.isStandard && wk.octave >= 1) {
    const wi = whiteKeys.indexOf(wk);
    const x = wi * WW - 0.5;
    const line = document.createElementNS(NS, 'line');
    line.setAttribute('x1', x); line.setAttribute('y1', WH - 30);
    line.setAttribute('x2', x); line.setAttribute('y2', WH);
    line.setAttribute('stroke', '#d0d0d0'); line.setAttribute('stroke-width', '1');
    svg.appendChild(line);
  }
}

// Highlight C4 (MIDI 60) and A4 (MIDI 69)
const c4rect = svg.querySelector('rect[data-midi="60"]');
if (c4rect) { c4rect.setAttribute('fill', '#b2ebf2'); c4rect.setAttribute('stroke', '#00838f'); c4rect.setAttribute('stroke-width', '2.5'); }

const a4rect = svg.querySelector('rect[data-midi="69"]');
if (a4rect) { a4rect.setAttribute('fill', '#fff9c4'); a4rect.setAttribute('stroke', '#f9a825'); a4rect.setAttribute('stroke-width', '2.5'); }

// Scroll to middle C
const scrollbox = document.getElementById('scrollbox');
setTimeout(() => {
  const c4wi = whiteKeys.findIndex(w => w.midi === 60);
  const target = c4wi * WW - scrollbox.clientWidth / 2 + WW * 2;
  scrollbox.scrollTo({ left: Math.max(0, target), behavior: 'smooth' });
}, 100);

function zoom(mode, btn) {
  document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (mode === 'full') {
    scrollbox.scrollTo({ left: 0, behavior: 'smooth' });
  } else if (mode === 'center') {
    const c3wi = whiteKeys.findIndex(w => w.midi === 48);
    const left = c3wi * WW - scrollbox.clientWidth / 3;
    scrollbox.scrollTo({ left: Math.max(0, left), behavior: 'smooth' });
  } else if (mode === 'tight') {
    const c4wi = whiteKeys.findIndex(w => w.midi === 60);
    const left = c4wi * WW - scrollbox.clientWidth / 2 + WW * 2;
    scrollbox.scrollTo({ left: Math.max(0, left), behavior: 'smooth' });
  }
}
</script>
</body>
</html>
